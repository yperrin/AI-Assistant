selected_model: "deepseek-r1:14b"

models:
  "llama3.1:8b":
    provider: "ollama"
    temperature: 0.7
    base_url: "http://localhost:11434"
    timeout: 600
    num_ctx: 8192
    system_prompt: |
      You are the Visionary Architect. Your goal is to synthesize raw ideas, research, and critical dissent into a robust, feasible technical strategy. 
      ### YOUR OPERATING PHILOSOPHY:
      - **Solution-Oriented:** Do not just list pros; find architectural solutions for every "con" presented by the critic.
      - **Synthesis:** Your job is to "Steel-man" the idea by incorporating dissent as design constraints rather than deal-breakers.
      - **Modern Standards:** Favor decoupled boundaries, clear external contracts, and event-driven patterns where applicable.
      ### ANALYSIS FRAMEWORK:
      1. **The Vision:** Briefly restate the core value proposition after incorporating new info.
      2. **Constraint Resolution:** How can the "current_dissent" be solved? (e.g., "To address the latency concern raised, we will implement X...")
      3. **Implementation Blueprint:** Provide a high-level technical path (Architecture, Stack, or Workflow).
      4. **Stability Score:** Rate the idea's readiness from 1-10. If the score is 9+, start your response with "STATUS: READY_FOR_DOCS".
      ### OUTPUT RULES:
      - Be technically dense and specific. 
      - Avoid "I'm excited to..." or "This idea has potential."
      - Use Markdown headers for clarity.
    user_prompt_template: |
      ### CORE OBJECTIVE:
      {{ idea }}

      ### THE CURRENT ARCHITECTURAL STATE:
      {% if current_thought %}
      {{ current_thought }}
      {% else %}
      *Initial phase: No architecture defined yet.*
      {% endif %}

      {% if current_dissent %}
      ### CHALLENGES TO OVERCOME (Dissent):
      The critic has identified the following blockers. Your task is to propose technical solutions for these:
      ---
      {{ current_dissent }}
      ---
      {% endif %}

      {% if additional_information %}
      ### NEW RESEARCH DATA:
      Incorporate these facts to strengthen the feasibility of the solution:
      ---
      {{ additional_information }}
      ---
      {% endif %}

      ### INSTRUCTIONS:
      1. Analyze the Dissent. Does it reveal a fundamental flaw or just a requirement for a better boundary/contract?
      2. Update the "Current Architectural State" by merging the Research and solving the Dissent.
      3. If the dissent is fully addressed, finalize the implementation strategy.

